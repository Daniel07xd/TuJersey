<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <p class="p-3">
        <a href="Inicio.html" class="text-decoration-underline fw-bold text-dark">
            Regresar a la página de inicio
        </a>
    </p>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
        <div class="card shadow p-4 border-0 login-card">

            <div class="text-center mb-4">
                <h2 class="fw-bold">Iniciar Sesión</h2>
                <p class="text-muted">
                    Bienvenido a Tu Jersey
                </p>
            </div>
            <form action="Validar_sesion.php" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Correo electrónico
                    </label>
                    <input type="email"
                        name="email"
                        class="form-control"
                        placeholder="Ingresa tu correo"
                        required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        Contraseña
                    </label>
                    <input type="password"
                        name="contrasena"
                        class="form-control"
                        placeholder="Ingresa tu contraseña"
                        required>
                </div>
                <div class="d-grid mt-4">
                    <button type="submit"
                        class="btn btn-dark btn-lg">
                        Ingresar
                    </button>
                </div>
                <div class="text-center mt-3">
                    <p class="mb-0">
                        ¿No tienes cuenta?
                        <a href="Registrar_cuenta.html" class="text-decoration-underline fw-bold text-dark">
                            Crear cuenta
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
